<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data Jadwal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.sidebar{
width:250px;
height:100vh;
background:#0d6efd;
position:fixed;
left:0;
top:0;
}

.sidebar h3{
color:white;
padding:20px;
text-align:center;
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:rgba(255,255,255,.15);
}

.content{
margin-left:250px;
padding:25px;
}

</style>

</head>

<body>

<div id="sidebar"></div>
<div class="content">
<div id="navbar"></div>

</div>

<div class="content">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Data Jadwal</h2>

<button
class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#jadwalModal">

Tambah Jadwal

</button>

</div>

<div class="card shadow border-0">

<div class="card-body">

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>
<th>Lapangan</th>
<th>Tanggal</th>
<th>Jam Mulai</th>
<th>Jam Selesai</th>
<th>Aksi</th>

</tr>

</thead>

<tbody id="jadwalTable">

</tbody>

</table>

</div>

</div>

</div>


<!-- MODAL -->

<div class="modal fade" id="jadwalModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5>Form Jadwal</h5>

<button
class="btn-close"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body">

<input
type="hidden"
id="jadwalId">

<div class="mb-3">

<label>Lapangan</label>

<select
id="lapangan_id"
class="form-select">

</select>

</div>

<div class="mb-3">

<label>Tanggal</label>

<input
type="date"
id="tanggal"
class="form-control">

</div>

<div class="mb-3">

<label>Jam Mulai</label>

<input
type="time"
id="jam_mulai"
class="form-control">

</div>

<div class="mb-3">

<label>Jam Selesai</label>

<input
type="time"
id="jam_selesai"
class="form-control">

</div>

</div>

<div class="modal-footer">

<button
class="btn btn-success"
onclick="saveJadwal()">

Simpan

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/jadwal.js"></script>
<script src="js/global.js"></script>

<script src="components/adminSidebar.js"></script>
<script src="components/navbar.js"></script>

<script>

loadAdminSidebar();
loadNavbar("Data Jadwal");

</script>
</body>
</html>
