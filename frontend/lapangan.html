<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking Lapangan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="sidebar"></div>

<div class="content">

<div id="navbar"></div>

<div class="card shadow">

<div class="card-header">

<h4 class="mb-0">
Daftar Jadwal Lapangan
</h4>

</div>

<div class="card-body">

<div class="table-responsive">

<table class="table table-striped">

<thead>

<tr>

<th>Lapangan</th>
<th>Tanggal</th>
<th>Jam Mulai</th>
<th>Jam Selesai</th>
<th>Aksi</th>

</tr>

</thead>

<tbody id="jadwalTable">

</tbody>

</table>

</div>

</div>

</div>

</div>

<script src="js/global.js"></script>
<script src="components/userSidebar.js"></script>
<script src="components/navbar.js"></script>

<script>

loadUserSidebar();
loadNavbar("Booking Lapangan");

const token =
localStorage.getItem("token");

async function loadJadwal(){

const response =
await fetch(
"http://localhost:5000/api/jadwal"
);

const data =
await response.json();

let html = "";

data.forEach(item=>{

const tanggal =
new Date(item.tanggal)
.toLocaleDateString(
"id-ID",
{
day:"2-digit",
month:"long",
year:"numeric"
}
);

html += `
<tr>

<td>
${item.nama_lapangan}
</td>

<td>
${tanggal}
</td>

<td>
${item.jam_mulai}
</td>

<td>
${item.jam_selesai}
</td>

<td>

<button
class="btn btn-success btn-sm"
onclick="booking(${item.id})">

Booking

</button>

</td>

</tr>
`;

});

document.getElementById(
"jadwalTable"
).innerHTML = html;

}

async function booking(id){

await fetch(
"http://localhost:5000/api/booking",
{
method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:`Bearer ${token}`
},

body:JSON.stringify({
jadwal_id:id
})
}
);

alert("Booking berhasil");

location.reload();

}

loadJadwal();

</script>

</body>
</html>
