<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Dashboard - SportBook</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<style>

body{
    background:#f4f6f9;
}

.sidebar{
    width:250px;
    min-height:100vh;
    background:#198754;
    position:fixed;
    left:0;
    top:0;
    color:white;
}

.sidebar h3{
    text-align:center;
    padding:20px;
    font-weight:bold;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 25px;
    transition:.3s;
}

.sidebar a:hover{
    background:rgba(255,255,255,.15);
}

.content{
    margin-left:250px;
    padding:25px;
}

.card-stat{
    border:none;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card-stat h2{
    font-weight:bold;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar"></div>
<div class="content">
<div id="navbar"></div>

</div>

<!-- CONTENT -->

<div class="content">

    <div class="mb-4">

        <h2 class="fw-bold">
            Dashboard User
        </h2>

        <p class="text-muted">

            Selamat datang,

            <span id="namaUser"></span>

            👋

        </p>

    </div>

    <!-- STATISTIK -->

    <div class="row g-4">

        <div class="col-md-4">

            <div class="card card-stat">

                <div class="card-body text-center">

                    <h6>Total Booking Saya</h6>

                    <h2 id="totalBooking">
                        0
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card card-stat">

                <div class="card-body text-center">

                    <h6>Booking Pending</h6>

                    <h2 id="pendingBooking">
                        0
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card card-stat">

                <div class="card-body text-center">

                    <h6>Lapangan Tersedia</h6>

                    <h2 id="totalLapangan">
                        0
                    </h2>

                </div>

            </div>

        </div>

    </div>

    <!-- RIWAYAT BOOKING -->

    <div class="card shadow border-0 mt-5">

        <div class="card-header bg-white">

            <h5 class="mb-0">

                Riwayat Booking Terbaru

            </h5>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-striped">

                    <thead>

                        <tr>

                            <th>ID</th>
                            <th>Lapangan</th>
                            <th>Status</th>

                        </tr>

                    </thead>

                    <tbody id="bookingTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

const token =
localStorage.getItem("token");

const role =
localStorage.getItem("role");

const nama =
localStorage.getItem("nama");

if(!token){

    window.location.href =
    "login.html";

}

if(role !== "user"){

    window.location.href =
    "admin-dashboard.html";

}

document.getElementById(
"namaUser"
).innerText = nama;


// TOTAL LAPANGAN

async function getLapangan(){

const res = await fetch(
"http://localhost:5000/api/lapangan"
);

const data = await res.json();

document.getElementById(
"totalLapangan"
).innerText = data.length;

}


// BOOKING USER

async function getBooking(){

const res = await fetch(
"http://localhost:5000/api/booking",
{
headers:{
Authorization:
`Bearer ${token}`
}
}
);

const data =
await res.json();

const myBooking =
data.filter(
item =>
item.nama === nama
);

document.getElementById(
"totalBooking"
).innerText =
myBooking.length;

const pending =
myBooking.filter(
item =>
item.status === "Pending"
);

document.getElementById(
"pendingBooking"
).innerText =
pending.length;


let html = "";

myBooking.slice(0,5).forEach(item=>{

html += `
<tr>

<td>${item.id}</td>

<td>${item.nama_lapangan}</td>

<td>

<span class="
badge
${item.status === 'Disetujui'
? 'bg-success'
: item.status === 'Ditolak'
? 'bg-danger'
: 'bg-warning'}
">

${item.status}

</span>

</td>

</tr>
`;

});

document.getElementById(
"bookingTable"
).innerHTML = html;

}


function logout(){

localStorage.clear();

window.location.href =
"login.html";

}


getLapangan();
getBooking();

</script>
<script src="js/global.js"></script>

<script src="components/userSidebar.js"></script>
<script src="components/navbar.js"></script>

<script>

loadUserSidebar();
loadNavbar("Dashboard User");

</script>
</body>
</html>
