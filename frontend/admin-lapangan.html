<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data Lapangan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.sidebar{
width:250px;
height:100vh;
background:#0d6efd;
position:fixed;
left:0;
top:0;
}

.sidebar h3{
color:white;
text-align:center;
padding:20px;
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:rgba(255,255,255,.15);
}

.content{
margin-left:250px;
padding:25px;
}

</style>

</head>

<body>

<div id="sidebar"></div>
<div class="content">
<div id="navbar"></div>


</div>

<div class="content">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Data Lapangan</h2>

<button
class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#lapanganModal">

Tambah Lapangan

</button>

</div>

<div class="card shadow border-0">

<div class="card-body">

<table class="table table-bordered">

<thead>

<tr>

<th>ID</th>
<th>Nama</th>
<th>Jenis</th>
<th>Harga</th>
<th>Status</th>
<th>Aksi</th>

</tr>

</thead>

<tbody id="lapanganTable">

</tbody>

</table>

</div>

</div>

</div>


<!-- MODAL -->

<div
class="modal fade"
id="lapanganModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5>Form Lapangan</h5>

<button
class="btn-close"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body">

<input
type="hidden"
id="lapanganId">

<div class="mb-3">

<label>Nama Lapangan</label>

<input
type="text"
id="nama_lapangan"
class="form-control">

</div>

<div class="mb-3">

<label>Jenis</label>

<select
id="jenis"
class="form-select">

<option value="Futsal">
Futsal
</option>

<option value="Badminton">
Badminton
</option>

</select>

</div>

<div class="mb-3">

<label>Harga Per Jam</label>

<input
type="number"
id="harga_per_jam"
class="form-control">

</div>

<div class="mb-3">

<label>Status</label>

<select
id="status"
class="form-select">

<option value="Aktif">
Aktif
</option>

<option value="Nonaktif">
Nonaktif
</option>

</select>

</div>

</div>

<div class="modal-footer">

<button
class="btn btn-success"
onclick="saveLapangan()">

Simpan

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/lapangan.js"></script>
<script src="js/global.js"></script>

<script src="components/adminSidebar.js"></script>
<script src="components/navbar.js"></script>

<script>

loadAdminSidebar();
loadNavbar("Data Lapangan");

</script>
</body>
</html>
